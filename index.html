<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Precisoa</title>
</head>

<body class="global-body">
    <!-- TELA DE PRELOADER (Cobre tudo enquanto carrega 3D e HDRI) -->
    <div id="preloader" class="preloader-overlay">
        <div class="preloader-text">Iniciando sua experiência...</div>
    </div>
    <!-- Conteúdo principal que aparecerá atrás do diamante -->
    <div class="home-content">
        <!-- Vídeo de fundo que surge após a intro -->
        <video id="home-video" class="home-video" src="/assets/img/a_d_a_a_e_b_b_a_mp_.mp4" autoplay muted loop
            playsinline preload="none"></video>
        <h1 class="home-title">Revelando sua Essência</h1>
        <p class="home-subtitle">Um espaço dedicado a transformar e elevar sua autoestima com tratamentos estéticos
            exclusivos.</p>
        <div class="botoes">
            <a href="#" class="botaoPrimario">Agendar Avaliação</a>
            <a href="#" class="botaoSecundario">Nossos Serviços</a>
        </div>
    </div>

    <!-- Implementação da Sessão 4 (Intro agora) -->
    <div class="hero-main">
        <div class="hero-animations">
            <section class="hero-div3d">
                <h2 class="hero-title">PRECIOSA</h2>
                <h2 class="hero-title">BELEZA</h2>
                <h2 class="hero-title">BEM-ESTAR</h2>
            </section>
        </div>
    </div>

    <!-- Área de teste de scroll -->
    <main class="scroll-test">
        <h2>Continue rolando... (Site entra aqui)</h2>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.163.0",
          "three/addons/": "https://esm.sh/three@0.163.0/examples/jsm/",
          "gsap": "https://esm.sh/gsap@3.12.5",
          "gsap/ScrollTrigger": "https://esm.sh/gsap@3.12.5/ScrollTrigger"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
</body>

</html>
